rules:
  - rule: "Kill Namespace or FS Escape"
    match:
      rules:
        - "Container Namespace Escape via setns"
        - "Namespace Manipulation via unshare"
        - "Filesystem Escape via mount syscall"
        - "Container Breakout via pivot_root"
    actions:
      - action: "Kubernetes:Terminate"
        parameters:
          gracePeriodSeconds: 0

  - rule: "Kill Privilege Escalation"
    match:
      rules:
        - "Privilege Escalation via setuid or setgid"
        - "Capability Escalation via capset"
    actions:
      - action: "Kubernetes:Terminate"
        parameters:
          gracePeriodSeconds: 0

  - rule: "Kill Shell in Container"
    match:
      rules:
        - "Shell Spawned Inside Container"
    actions:
      - action: "Kubernetes:Terminate"
        parameters:
          gracePeriodSeconds: 0

  - rule: "Kill Sensitive File Access"
    match:
      rules:
        - "Sensitive File Access in Container"
    actions:
      - action: "Kubernetes:Terminate"
        parameters:
          gracePeriodSeconds: 0

  - rule: "Quarantine Privileged Pod"
    match:
      rules:
        - "Privileged Pod Created"
    actions:
      - action: "Kubernetes:Label"
        parameters:
          labels:
            quarantine: "true"
            threat: "privileged-pod"

  - rule: "Quarantine Exec Target Pod"
    match:
      rules:
        - "kubectl exec into Pod"
    actions:
      - action: "Kubernetes:Label"
        parameters:
          labels:
            quarantine: "true"
            threat: "kubectl-exec"

  - rule: "Quarantine RBAC Escalation"
    match:
      rules:
        - "ClusterRoleBinding Created"
    actions:
      - action: "Kubernetes:Label"
        parameters:
          labels:
            quarantine: "true"
            threat: "rbac-escalation"
