- rule: "Container Breakout via pivot_root"
  desc: "pivot_root() inside container"
  condition: >
    evt.type = pivot_root
    and container.id != host
    and not proc.name startswith "runc:"
    and k8s.ns.name = demo-sec
  output: >
    CRITICAL pivot_root inside container
