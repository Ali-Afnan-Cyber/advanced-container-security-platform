- rule: "Shell Spawned Inside Container"
  desc: "Interactive shell spawned inside running container"
  condition: >
    evt.type = execve
    and container.id != host
    and proc.name in (bash, sh, dash, zsh, ksh, fish)
    and not proc.pname in (sh, bash, containerd, runc, k3s)
    and not proc.name startswith "runc:"
    and k8s.ns.name = demo-sec
  output: >
    WARNING shell spawned in container
    (shell=%proc.name pid=%proc.pid parent=%proc.pname
    container=%container.name image=%container.image.repository
    cmdline=%proc.cmdline)
  priority: WARNING
  tags: [container, shell_spawn, T1059]

- rule: "Sensitive File Access in Container"
  desc: "Sensitive file opened inside container"
  condition: >
    evt.type in (open, openat)
    and container.id != host
    and (
      fd.name in (/etc/shadow, /etc/passwd, /etc/sudoers)
      or fd.name startswith /root/.ssh
      or fd.name = /var/run/docker.sock
    )
    and not proc.name in (falco, k3s, containerd, coredns, prometheus)
    and not proc.name startswith "runc:"
    and k8s.ns.name = demo-sec
  output: >
    WARNING sensitive file access in container
    (proc=%proc.name pid=%proc.pid file=%fd.name
    container=%container.name image=%container.image.repository)
  priority: WARNING
  tags: [container, sensitive_file, T1552]

- rule: "Filesystem Escape via mount syscall"
  desc: "mount() called inside container"
  condition: >
    evt.type = mount
    and container.id != host
    and not proc.name in (runc, containerd, k3s, systemd)
    and not proc.name startswith "runc:"
    and k8s.ns.name = demo-sec
  output: >
    CRITICAL mount inside container
    (proc=%proc.name pid=%proc.pid container=%container.name
    image=%container.image.repository)
  priority: CRITICAL
  tags: [container, fs_escape, T1611]

- rule: "Container Namespace Escape via setns"
  desc: "setns() called inside container"
  condition: >
    evt.type = setns
    and container.id != host
    and not proc.name in (runc, containerd, dockerd, k3s)
    and not proc.name startswith "runc:"
