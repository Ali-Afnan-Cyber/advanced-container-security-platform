  priority: CRITICAL
  tags: [container, breakout, T1611]

- rule: "Privilege Escalation via setuid or setgid"
  desc: "setuid/setgid to root inside container"
  condition: >
    evt.type in (setuid, setgid)
    and container.id != host
    and evt.arg.uid = 0
    and not proc.name in (runc, su, sudo, containerd)
    and not proc.name startswith "runc:"
    and k8s.ns.name = demo-sec
  output: >
    WARNING setuid/setgid to root
    (proc=%proc.name pid=%proc.pid container=%container.name
    image=%container.image.repository)
  priority: WARNING
  tags: [container, privilege_escalation, T1548]

- rule: "Capability Escalation via capset"
  desc: "capset() inside container"
  condition: >
    evt.type = capset
    and container.id != host
    and not proc.name in (runc, containerd, dockerd, k3s, ping)
    and not proc.name startswith "runc:"
    and k8s.ns.name = demo-sec
  output: >
    WARNING capset inside container
    (proc=%proc.name pid=%proc.pid container=%container.name
    image=%container.image.repository)
  priority: WARNING
  tags: [container, capability_escalation, T1548]

- rule: "Privileged Pod Created"
  desc: "Pod created with privileged/hostPID/hostNetwork flag"
  condition: >
    ka.verb in (create, update, patch)
    and ka.target.resource = pods
    and ka.target.namespace = demo-sec
    and (
      ka.request.object contains "\"privileged\":true"
      or ka.request.object contains "\"hostPID\":true"
      or ka.request.object contains "\"hostNetwork\":true"
    )
  output: >
    CRITICAL privileged pod created
    (user=%ka.user.name pod=%ka.target.name
    namespace=%ka.target.namespace)
  priority: CRITICAL
  source: k8s_audit
  tags: [k8s_audit, privileged_pod, T1610]

- rule: "kubectl exec into Pod"
  desc: "kubectl exec or attach into pod"
  condition: >
    ka.verb = create
    and ka.target.resource in (pods/exec, pods/attach)
    and ka.target.namespace = demo-sec
  output: >
    WARNING kubectl exec detected
    (user=%ka.user.name pod=%ka.target.name
    namespace=%ka.target.namespace)
  priority: WARNING
  source: k8s_audit
  tags: [k8s_audit, kubectl_exec, T1609]

- rule: "ClusterRoleBinding Created"
  desc: "New ClusterRoleBinding created"
  condition: >
    ka.verb = create
    and ka.target.resource = clusterrolebindings
  output: >
    CRITICAL ClusterRoleBinding created
    (user=%ka.user.name binding=%ka.target.name)
  priority: CRITICAL
  source: k8s_audit
  tags: [k8s_audit, rbac_escalation, T1078]
