name: Container Supply Chain Security Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/pipeline.yml"

  pull_request:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/pipeline.yml"

permissions:
  contents: read
  packages: write
  id-token: write

env:
  IMAGE_TAG: ${{ github.sha }}
  REGISTRY: docker.io

jobs:
  supply-chain-security:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set image name
      id: img
      run: |
        USERNAME=$(echo "${{ secrets.DOCKERHUB_USERNAME }}" | tr '[:upper:]' '[:lower:]')
        IMAGE="${USERNAME}/secure-app"
        IMAGE_REF="${IMAGE}:${{ env.IMAGE_TAG }}"
        echo "IMAGE=${IMAGE}"         >> $GITHUB_ENV
        echo "IMAGE_REF=${IMAGE_REF}" >> $GITHUB_ENV
        echo "image_ref=${IMAGE_REF}" >> $GITHUB_OUTPUT

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3

    - name: Install Syft
      uses: anchore/sbom-action/download-syft@v0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/Dockerfile
        load: true
        push: false
        no-cache: true
        tags: ${{ steps.img.outputs.image_ref }}

    - name: Inspect Built Image
      run: |
        docker image inspect ${{ steps.img.outputs.image_ref }}

    - name: Check Base OS
      run: |
        docker run --rm --entrypoint cat \
          ${{ steps.img.outputs.image_ref }} \
          /etc/os-release || true

    - name: Trivy Scan (Fail on Fixable CRITICAL)
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.img.outputs.image_ref }}
        severity: CRITICAL
        exit-code: '1'
        vuln-type: 'os,library'
        ignore-unfixed: true 

    - name: Trivy JSON Report
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.img.outputs.image_ref }}
        format: json
        output: trivy-results.json
        exit-code: '0'

    - name: Upload Trivy Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-report
        path: trivy-results.json

    - name: Push Image
      id: push
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./app/Dockerfile
        push: true
        no-cache: true
        tags: |
          ${{ env.IMAGE_REF }}
          ${{ env.IMAGE }}:latest

    - name: Set full image reference
      run: |
        DIGEST="${{ steps.push.outputs.digest }}"
        FULL_REF="${{ env.REGISTRY }}/${{ env.IMAGE }}@${DIGEST}"
        echo "FULL_REF=${FULL_REF}" >> $GITHUB_ENV
        echo "DIGEST=${DIGEST}"     >> $GITHUB_ENV

    - name: Cosign Sign (Keyless)
      run: cosign sign --yes "$FULL_REF"

    - name: Generate SBOM
      run: syft "$FULL_REF" -o spdx-json=sbom.json

    - name: Attach SBOM Attestation
      run: |
        cosign attest --yes \
          --predicate sbom.json \
          --type spdxjson \
          "$FULL_REF"

    - name: Generate Provenance Predicate
      run: |
        cat > provenance.json << PROVEOF
        {
          "buildType": "https://github.com/${{ github.repository }}/.github/workflows/pipeline.yml@refs/heads/main",
          "builder": {
            "id": "https://github.com/actions/runner"
          },
          "invocation": {
            "configSource": {
              "uri": "git+https://github.com/${{ github.repository }}@refs/heads/main",
              "digest": { "sha1": "${{ github.sha }}" },
              "entryPoint": ".github/workflows/pipeline.yml"
            },
            "parameters": {},
            "environment": {
              "github_run_id": "${{ github.run_id }}",
              "github_run_number": "${{ github.run_number }}",
              "github_actor": "${{ github.actor }}"
            }
          },
          "metadata": {
            "buildInvocationId": "${{ github.run_id }}-${{ github.run_attempt }}",
            "buildStartedOn": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "completeness": {
              "parameters": true,
              "environment": true,
              "materials": true
            },
            "reproducible": false
          },
          "materials": [
            {
              "uri": "git+https://github.com/${{ github.repository }}",
              "digest": { "sha1": "${{ github.sha }}" }
            }
          ]
        }
        PROVEOF

    - name: Attach Provenance Attestation
      run: |
        cosign attest --yes \
          --predicate provenance.json \
          --type slsaprovenance \
          "$FULL_REF"

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.json

    - name: Upload Provenance
      uses: actions/upload-artifact@v4
      with:
        name: provenance
        path: provenance.json

    - name: Verify Signature (Rekor)
      run: |
        cosign verify \
          --certificate-identity-regexp \
            "https://github.com/${{ github.repository }}/.github/workflows/.*" \
          --certificate-oidc-issuer \
            "https://token.actions.githubusercontent.com" \
          "$FULL_REF"
